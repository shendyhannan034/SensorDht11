<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sensor DHT11</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        /* SIDEBAR  */
        .sidebar {
            width: 220px;
            background: #292929;
            color: #292929;
            height: 300vh;
            padding: 20px;
        }

            .sidebar h1 {
                color: #ffffff;
            }
        
        /*  TAMPILAN ITEM   */
        .menu-item {
            padding: 12px;
            margin: 10px 0;
            background: #969696;
            border-radius: 10px;
            cursor: pointer;
        }

            .menu-item:hover {
                background: #121212;
                color: #f9f9f9;
            }

            .menu-item.active {
                background: #121212;
                color: #f9f9f9;
            }

        /*  TAMPILAN KESELURUHAN */
        .main {
            flex: 1;
            padding: 50px;
            padding-top: 140px;
            background-image: url("img5.jpg");
            background-size: cover;
            background-position: center;
            max-width: 1920px;
        }

        /*  BACKGROUND GRAFIK   */
        canvas {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 10px;
        }

        .judul-grafik {
            margin-top: -20px;
        }

        /*  PAGE    */
        .page {
            display: none;
            color: #000000;
        }

            .page.active {
                display: block;
            }

        /*  POSISI TANGGAL & STATUS   */
        .top-right {
            position: absolute;
            top: 20px;
            right: 30px;
        }

        .datetime-box {
            background: rgba(20, 40, 80, 0.8);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            width: 250px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .date {
            font-size: 14px;
            opacity: 0.8;
        }

        .time {
            font-size: 22px;
            font-weight: bold;
            margin-top: 5px;
        }

        /* STATUS SISTEM */
        .status-box {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .online {
            background-color: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .offline {
            background-color: red;
            box-shadow: 0 0 10px red;
        }

        .status-text {
            font-weight: bold;
        }

        .status-desc {
            font-size: 12px;
            opacity: 0.7;
        }

        /*  CARD    */
        .card-container {
            display: flex;
            gap: 20px;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border-radius: 20px;
            width: 280px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        /*  ICON CARD   */
        .icon {
            font-size: 40px;
        }

        /* TEXT CARD */
        .info h3 {
            margin: 0;
            font-size: 14px;
            opacity: 0.8;
        }

        .info h1 {
            margin: 5px 0;
            font-size: 28px;
        }

        .info p {
            margin: 0;
            font-size: 12px;
            color: lightgreen;
        }

        /*  WARNA CARD    */
        .suhu-card {
            border-left: 5px solid red;
            background: linear-gradient(135deg, rgba(255,0,0,0.4), rgba(0,0,0,0.6));
        }

        .kelembapan-card {
            border-left: 5px solid cyan;
            background: linear-gradient(135deg, rgba(0,150,255,0.4), rgba(0,0,0,0.6));
        }

        /*  TABEL   */
        .tabel-riwayat {
            width: 100%;
            border-collapse: collapse;
            margin-top: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            overflow: hidden;
        }

        .tabel-riwayat {
            width: 100%;
            border-collapse: collapse;
            margin-top: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            overflow: hidden;
        }

            .tabel-riwayat th {
                background: rgba(0,0,0,0.6);
                color: white;
                padding: 12px;
            }

            .tabel-riwayat td {
                padding: 10px;
                text-align: center;
                color: black;
            }

            .tabel-riwayat tr:nth-child(even) {
                background: rgba(255,255,255,0.1);
            }

            .tabel-riwayat tr:hover {
                background: rgba(255,255,255,0.2);
            }
    </style>
</head>

<body>

    <div class="sidebar">
        <h1>DASHBOARD</h1>
        <div class="menu-item active" onclick="showPage('dashboard', this)">Data Real-Time</div>
        <div class="menu-item" onclick="showPage('grafik', this)">Grafik</div>
        <div class="menu-item" onclick="showPage('riwayat', this)">Riwayat</div>
    </div>

    <div class="main">
        <div class="top-right">
            <div class="datetime-box">
                <div class="date">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="tanggal">Jumat, 1 Mei 2026</span>
                </div>
                <div class="time" id="jam">23:39:32</div>

                <!-- STATUS SISTEM -->
                <div class="status-box">
                    <span class="dot online"></span>
                    <span class="status-text">Online</span>
                    <div class="status-desc">Terhubung ke Firebase</div>
                </div>
            </div>
        </div>
        <!-- DASHBOARD -->
        <div id="dashboard" class="page active">
            <h2 class="judul-grafik">Data Real-Time</h2>
            <div class="card-container">

                <div class="card suhu-card">
                    <div class="icon">🌡️</div>
                    <div class="info">
                        <h3>SUHU</h3>
                        <h1 id="suhu">--</h1>
                        <p>Normal</p>
                    </div>
                </div>

                <div class="card kelembapan-card">
                    <div class="icon">💧</div>
                    <div class="info">
                        <h3>KELEMBAPAN</h3>
                        <h1 id="kelembapan">--</h1>
                        <p>Normal</p>
                    </div>
                </div>

            </div>
        </div>

        <!-- GRAFIK -->
        <div id="grafik" class="page">
            <h2 class="judul-grafik">Grafik Suhu</h2>
            <canvas id="suhuChart"></canvas>

            <h2>Grafik Kelembapan</h2>
            <canvas id="kelembapanChart"></canvas>
        </div>

        <!-- RIWAYAT -->
        <div id="riwayat" class="page">
            <h2 class="judul-grafik">Riwayat Data</h2>

            <table class="tabel-riwayat">
                <thead>
                    <tr>
                        <th>Tanggal / Jam</th>
                        <th>Suhu °C</th>
                        <th>Kelembapan</th>
                    </tr>
                </thead>
                <tbody id="table"></tbody>
            </table>
        </div>

    </div>

    <script>

        const urlLive = "https://sensordht11-c9561-default-rtdb.asia-southeast1.firebasedatabase.app/realtime.json";
        const urlHistory = "https://sensordht11-c9561-default-rtdb.asia-southeast1.firebasedatabase.app/history.json";

        // ================= NAVIGASI =================
        function showPage(page, el) {
            document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
            document.getElementById(page).classList.add("active");

            document.querySelectorAll(".menu-item").forEach(m => m.classList.remove("active"));
            el.classList.add("active");
        }
        // ================= GRAFIK ===================
        let dataSuhu = [];
        let dataKelembapan = [];
        let labelWaktu = [];

        let lastUpdate = 0;
        let timeoutOffline = 7000;
        let isFirstLoad = true;
        let lastData = "";
        let lastSuhu = null;
        let lastKelembapan = null;

        const ctx = document.getElementById("suhuChart").getContext("2d");

        // 🔥 gradient area
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, "rgba(255, 0, 0, 0.6)");
        gradient.addColorStop(1, "rgba(255, 0, 0, 0.05)");

        const suhuChart = new Chart(document.getElementById("suhuChart"), {
            type: "line",
            data: {
                labels: labelWaktu,
                datasets: [{
                    label: "Suhu (°C)",
                    data: dataSuhu,

                    borderColor: "red",
                    backgroundColor: gradient,

                    fill: true,

                    tension: 0.4, // 🔥 smooth line

                    pointRadius: 4,
                    pointBackgroundColor: "red",
                    pointBorderWidth: 2,
                    pointBorderColor: "#fff"
                }]
            },

            options: {
                responsive: true,

                animation: {
                    duration: 1000,
                    easing: "easeInOutQuart"
                },
                plugins: {
                    legend: {
                        labels: {
                            color: "white"
                        }
                    }
                },

                scales: {
                    x: {
                        ticks: { color: "white" },
                        grid: { color: "rgba(255,255,255,0.1)" }
                    },
                    y: {
                        ticks: { color: "white" },
                        grid: { color: "rgba(255,255,255,0.1)" }
                    }
                }
            }
         });
            // 🔥 KELEMBAPAN CHART
            const ctxKelembapan = document.getElementById("kelembapanChart").getContext("2d");

            const gradientKelembapan = ctxKelembapan.createLinearGradient(0, 0, 0, 300);
            gradientKelembapan.addColorStop(0, "rgba(0,150,255,0.6)");
            gradientKelembapan.addColorStop(1, "rgba(0,150,255,0.05)");

            const kelembapanChart = new Chart(ctxKelembapan, {
                type: "line",
                data: {
                    labels: labelWaktu,
                    datasets: [{
                        label: "Kelembapan (%)",
                        data: dataKelembapan,
                        borderColor: "blue",
                        backgroundColor: gradientKelembapan,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: "blue",
                        pointBorderColor: "#fff"
                    }]
                },
                options: {
                    responsive: true,

                    animation: {
                        duration: 1000,
                        easing: "easeInOutQuart"
                    },

                    plugins: {
                        legend: { labels: { color: "white" } }
                    },
                    scales: {
                        x: { ticks: { color: "white" } },
                        y: { ticks: { color: "white" } }
                    }
                }
            });


        // ================= REALTIME =================
        function ambilLive() {
            fetch(urlLive + "?t=" + Date.now())
                .then(res => res.json())
                .then(data => {

                    if (!data) return;

                    let dataString = JSON.stringify(data);

                    // 🔥 saat pertama load → jangan langsung dianggap online
                    if (isFirstLoad) {
                        lastData = dataString;
                        isFirstLoad = false;
                        return; // ⛔ STOP, jangan update status dulu
                    }

                    // ✅ hanya update kalau data benar-benar berubah
                    if (dataString !== lastData) {
                        lastUpdate = Date.now();
                        lastData = dataString;
                    }

                    document.getElementById("suhu").innerText = data.suhu;
                    document.getElementById("kelembapan").innerText = data.kelembapan + " %";

                    let waktu = new Date().toLocaleTimeString();

                    labelWaktu.push(waktu);
                    dataSuhu.push(data.suhu);
                    dataKelembapan.push(data.kelembapan);

                    // batasi data (biar tidak berat)
                    if (labelWaktu.length > 10) {
                        labelWaktu.shift();
                        dataSuhu.shift();
                        dataKelembapan.shift();
                    }

                    suhuChart.update();
                    kelembapanChart.update();
                });
        }

        // ================= RIWAYAT HARI =================
        function ambilHistory() {
            fetch(urlHistory)
                .then(res => res.json())
                .then(data => {

                    if (!data) return;

                    window.historyData = data;
                    let table = document.getElementById("table");
                    table.innerHTML = "";

                    Object.keys(data).forEach(tanggal => {

                        let hariData = data[tanggal];

                        // 🔥 STEP 1: hitung rata-rata per JAM dulu
                        let perJam = {};

                        Object.keys(hariData).forEach(waktu => {
                            let jam = waktu.substring(0, 2);

                            if (!perJam[jam]) {
                                perJam[jam] = { suhu: 0, kelembapan: 0, count: 0 };
                            }

                            perJam[jam].suhu += hariData[waktu].suhu;
                            perJam[jam].kelembapan += hariData[waktu].kelembapan;
                            perJam[jam].count++;
                        });

                        // 🔥 STEP 2: rata-rata HARI dari rata-rata JAM
                        let totalSuhu = 0;
                        let totalKelembapan = 0;
                        let jumlahJam = 0;

                        Object.keys(perJam).forEach(jam => {
                            totalSuhu += perJam[jam].suhu / perJam[jam].count;
                            totalKelembapan += perJam[jam].kelembapan / perJam[jam].count;
                            jumlahJam++;
                        });

                        let avgSuhu = (totalSuhu / jumlahJam).toFixed(1);
                        let avgKelembapan = (totalKelembapan / jumlahJam).toFixed(1);

                        let row = `
                        <tr>
                        <td style="cursor:pointer;color:blue;" onclick="showDetail('${tanggal}')">${tanggal}</td>
                        <td>${avgSuhu}</td>
                        <td>${avgKelembapan}</td>
                        </tr>
                        `;

                        table.innerHTML += row;

                    });
                });
        }

        // ================= DETAIL JAM =================
        function showDetail(tanggal) {

            let data = window.historyData[tanggal];
            let table = document.getElementById("table");

            table.innerHTML = `
            <tr><td colspan="3"><button onclick="ambilHistory()">⬅ Kembali</button></td></tr>
            `;

            // 🔥 HITUNG RATA-RATA PER JAM (dari data menit)
            let perJam = {};

            Object.keys(data).forEach(waktu => {

                let jam = waktu.substring(0, 2);

                if (!perJam[jam]) {
                    perJam[jam] = { suhu: 0, kelembapan: 0, count: 0 };
                }

                perJam[jam].suhu += data[waktu].suhu;
                perJam[jam].kelembapan += data[waktu].kelembapan;
                perJam[jam].count++;
            });

            Object.keys(perJam).sort().forEach(jam => {

                let avgSuhu = (perJam[jam].suhu / perJam[jam].count).toFixed(1);
                let avgKelembapan = (perJam[jam].kelembapan / perJam[jam].count).toFixed(1);

                let row = `
                <tr>
                <td>${jam}:00</td>
                <td>${avgSuhu}</td>
                <td>${avgKelembapan}</td>
                </tr>
                `;

                table.innerHTML += row;
            });
        }
        function updateJam() {
            let now = new Date();

            let tanggal = now.toLocaleDateString("id-ID", {
                weekday: "long",
                year: "numeric",
                month: "long",
                day: "numeric"
            });

            let jam = now.toLocaleTimeString("id-ID");

            document.getElementById("tanggal").innerHTML = tanggal;
            document.getElementById("jam").innerHTML = jam;
        }

        // STATUS FIREBASE
        function updateStatus() {
            const dot = document.querySelector(".dot");
            const text = document.querySelector(".status-text");
            const desc = document.querySelector(".status-desc");

            let sekarang = Date.now();

            if (sekarang - lastUpdate < timeoutOffline) {
                dot.classList.add("online");
                dot.classList.remove("offline");
                text.innerHTML = "Online";
                desc.innerHTML = "Terhubung ke Firebase";
            } else {
                dot.classList.add("offline");
                dot.classList.remove("online");
                text.innerHTML = "Offline";
                desc.innerHTML = "Tidak terhubung";
            }
        }

        // 🔥 PENTING: PANGGIL SEMUA
        setInterval(updateJam, 1000);
        setInterval(updateStatus, 1000);
        updateJam();
        updateStatus();

        setInterval(ambilLive, 3000);
        setInterval(ambilHistory, 10000);

        ambilLive();
        ambilHistory();


    </script>

</body>
</html>
