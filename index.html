<!DOCTYPE html>
<html>
<head>
    <title>Monitoring Sensor DHT11</title>
</head>
<body>

    <h1>Monitoring Sensor DHT11</h1>

    <p>Suhu: <span id="suhu">Loading...</span> °C</p>
    <p>Kelembaban: <span id="kelembaban">Loading...</span> %</p>
    <p>Lampu: <span id="lampu">Loading...</span> </p>

    <script>
        const url = "https://sensordht11-c9561-default-rtdb.asia-southeast1.firebasedatabase.app/DHT11.json";

        function ambilData() {
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    console.log(data); // debug

                    document.getElementById("suhu").innerText = data.suhu;
                    document.getElementById("kelembaban").innerText = data.kelembaban;
                    document.getElementById("lampu").innerText = data.lampu;
                })
                .catch(err => {
                    console.error("Error:", err);
                });
        }

        // refresh tiap 2 detik
        setInterval(ambilData, 2000);

        // load pertama
        ambilData();
    </script>

</body>
</html>
